openapi: 3.1.0
info:
  title: AIX App API
  version: 1.0.3
  description: First-wave published AIX App API contract covering operator
    methods, source registration, run tracking, resumable uploads, and imported
    session reads.
servers:
  - url: https://{tenantId}.nexushub.sh
    variables:
      tenantId:
        default: t-example
tags:
  - name: AIX
paths:
  /runtime/operations/aix.credentials.issue:
    post:
      operationId: aix.credentials.issue
      summary: Issue an entity-bound AIX client token and setup bundle.
      tags:
        - AIX
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required:
                - entityId
                - preset
              properties:
                entityId:
                  type: string
                preset:
                  type: string
                  enum:
                    - offboarding
                    - ongoing
                label:
                  type: string
                expiresAt:
                  type: number
                providerAllowlist:
                  type: array
                  items:
                    type: string
                defaultMode:
                  type: string
                  enum:
                    - backfill
                    - incremental
                    - live
                defaultCadence:
                  type: string
                  enum:
                    - manual
                    - five_minutes
                    - ten_minutes
                    - daily
                    - live
                runtimeBaseUrl:
                  type: string
      responses:
        "200":
          description: Successful AIX method response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  payload:
                    type: object
                    required:
                      - ok
                      - credential
                      - token
                      - setupBundle
                    properties:
                      ok:
                        type: boolean
                        enum:
                          - true
                      credential:
                        $ref: "#/components/schemas/CredentialSummary"
                      token:
                        type: string
                      setupBundle:
                        $ref: "#/components/schemas/SetupBundle"
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
  /runtime/operations/aix.credentials.list:
    post:
      operationId: aix.credentials.list
      summary: List issued AIX client credentials.
      tags:
        - AIX
      security:
        - bearerAuth: []

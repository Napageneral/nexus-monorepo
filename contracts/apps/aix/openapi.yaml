components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UnauthorizedError:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
          enum:
            - unauthorized
            - not_authenticated
    GenericError:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
        error:
          type: string
        detail:
          type:
            - string
            - "null"
    CredentialSummary:
      type: object
      required:
        - id
        - entityId
        - label
        - preset
        - createdAt
        - lastUsedAt
        - expiresAt
        - revokedAt
      properties:
        id:
          type: string
        entityId:
          type: string
        label:
          type:
            - string
            - "null"
        preset:
          type: string
          enum:
            - offboarding
            - ongoing
        createdAt:
          type: number
        lastUsedAt:
          type:
            - number
            - "null"
        expiresAt:
          type:
            - number
            - "null"
        revokedAt:
          type:
            - number
            - "null"
    SetupBundle:
      type: object
      required:
        - runtimeBaseUrl
        - token
        - commands
        - promptText
      properties:
        runtimeBaseUrl:
          type: string
          format: uri
        token:
          type: string
        commands:
          type: array
          items:
            type: string
        promptText:
          type: string
    EntitySummary:
      type: object
      required:
        - id
        - name
        - type
        - normalized
        - isUser
        - isAgent
        - origin
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type:
            - string
            - "null"
        normalized:
          type:
            - string
            - "null"
        isUser:
          type: boolean
        isAgent:
          type: boolean
        origin:
          type:
            - string
            - "null"
        createdAt:
          type:
            - number
            - "null"
    SourceProviderSummary:
      type: object
      required:
        - provider
        - enabled
        - lastSeenAt

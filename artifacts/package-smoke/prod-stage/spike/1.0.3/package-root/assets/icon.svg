<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="spikeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#spikeGradient)"/>

  <!-- Lightning bolt / spike symbol -->
  <path d="M 55 20 L 35 50 L 45 50 L 40 80 L 65 45 L 55 45 Z" fill="white" stroke="none"/>

  <!-- Code brackets -->
  <text x="25" y="30" font-family="monospace" font-size="18" font-weight="bold" fill="white" opacity="0.7">&lt;</text>
  <text x="70" y="30" font-family="monospace" font-size="18" font-weight="bold" fill="white" opacity="0.7">&gt;</text>
</svg>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nexus | Sign in</title>
    <style>
      :root {
        --bg: #f3f7ff;
        --ink: #0b1f3a;
        --muted: #496180;
        --line: #c8d6ec;
        --panel: #ffffff;
        --brand: #0b7a6e;
        --brand-ink: #ffffff;
        --brand-strong: #07574f;
        --accent: #19418a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--ink);
        font-family:
          "Avenir Next",
          Manrope,
          "SF Pro Text",
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(1200px 600px at 85% -10%, #d8e8ff 0%, rgba(216, 232, 255, 0) 58%),
          radial-gradient(900px 500px at -10% 100%, #c9f2ea 0%, rgba(201, 242, 234, 0) 55%),
          var(--bg);
      }

      .shell {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 28px;
      }

      .brand-mark {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.02em;
      }

      .brand-meta {
        font-size: 12px;
        letter-spacing: 0.08em;
        color: var(--muted);
        text-transform: uppercase;
      }

      .panel {
        background: linear-gradient(180deg, #ffffff 0%, #f9fbff 100%);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(17, 39, 77, 0.07);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 46px);
        letter-spacing: -0.03em;
      }

      .lead {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.5;
        max-width: 62ch;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 6px 12px;
        background: #f4f8ff;
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 18px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #8aa1c2;
      }

      .status.ok .status-dot {
        background: #0b7a6e;
      }

      .status.err .status-dot {
        background: #c13d3d;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        border-color: #abc1e2;
      }

      button.primary {
        background: linear-gradient(180deg, #0b8b7d 0%, var(--brand) 100%);
        border-color: var(--brand-strong);
        color: var(--brand-ink);
      }

      button.primary:hover {
        background: linear-gradient(180deg, #0a7f72 0%, var(--brand-strong) 100%);
      }

      button.subtle {
        color: var(--accent);
      }

      .hint {
        margin-top: 16px;
        font-size: 13px;
        color: var(--muted);
      }

      .operator {
        margin-top: 22px;
        border-top: 1px dashed var(--line);
        padding-top: 16px;
      }

      .operator-toggle {
        border: none;
        background: transparent;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        padding: 0;
      }

      .operator-form {
        display: none;
        margin-top: 12px;
        max-width: 420px;
      }

      .operator-form.visible {
        display: block;
      }

      label {
        display: block;
        margin: 8px 0 6px;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 11px;
        font-size: 14px;
        color: var(--ink);
        background: #fff;
      }

      @media (max-width: 640px) {
        .shell {
          padding: 20px 14px 32px;
        }

        .panel {
          padding: 18px;
          border-radius: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="brand">
        <div class="brand-mark">NEXUS</div>
        <div class="brand-meta">Hosted Control Plane</div>
      </div>

      <section class="panel">
        <h1>Sign in to your workspace</h1>
        <p class="lead">
          Secure access to your tenant runtime. No debug controls or token plumbing are exposed in this customer
          surface.
        </p>

        <div id="status" class="status">
          <span class="status-dot"></span>
          <span id="statusText">Checking session</span>
        </div>

        <div class="actions">
          <button id="googleBtn" class="primary">Continue with Google</button>
          <button id="openBtn" class="primary" hidden>Open Workspace</button>
          <button id="logoutBtn" class="subtle" hidden>Sign out</button>
        </div>
        <p class="hint" id="hintText">Use Google login to continue. You will be routed to your tenant runtime.</p>

        <section id="operatorPanel" class="operator" hidden>
          <div class="operator-toggle">Operator access</div>
          <form id="operatorForm" class="operator-form visible">
            <label for="username">Username</label>
            <input id="username" value="owner" />
            <label for="password">Password</label>
            <input id="password" type="password" value="" />
            <div class="actions" style="margin-top: 10px;">
              <button id="operatorLoginBtn" type="submit">Sign in</button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <script>
      const state = {
        session: null,
      };
      const operatorMode = new URLSearchParams(window.location.search).get("operator") === "1";

      const el = (id) => document.getElementById(id);

      function setStatus(kind, text) {
        const status = el("status");
        status.classList.remove("ok", "err");
        if (kind) {
          status.classList.add(kind);
        }
        el("statusText").textContent = text;
      }

      function applySession(session) {
        state.session = session;
        const authed = Boolean(session && session.authenticated);
        el("googleBtn").hidden = authed;
        el("openBtn").hidden = !authed;
        el("logoutBtn").hidden = !authed;

        if (authed) {
          const who = session.display_name || session.email || session.username || session.entity_id || "user";
          setStatus("ok", `Signed in as ${who}`);
          el("hintText").textContent = "Launch opens your tenant control UI with a signed runtime token.";
          return;
        }

        setStatus("err", "Not signed in");
        el("hintText").textContent = "Use Google login to continue. You will be routed to your tenant runtime.";
      }

      async function readJson(res) {
        const text = await res.text();
        if (!text) return {};
        try {
          return JSON.parse(text);
        } catch {
          return { raw: text };
        }
      }

      async function refreshSession() {
        try {
          const res = await fetch("/api/auth/session", { method: "GET" });
          const body = await readJson(res);
          applySession(body);
        } catch {
          applySession(null);
          setStatus("err", "Session unavailable");
        }
      }

      async function operatorLogin(event) {
        event.preventDefault();
        const username = String(el("username").value || "").trim();
        const password = String(el("password").value || "");
        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const body = await readJson(res);
          if (!res.ok || !body?.ok) {
            setStatus("err", "Operator login failed");
            return;
          }
          await refreshSession();
        } catch {
          setStatus("err", "Operator login failed");
        }
      }

      function startGoogle() {
        const query = new URLSearchParams({
          provider: "google",
          return_to: "/app/chat?session=main",
        });
        window.location.href = `/api/auth/oidc/start?${query.toString()}`;
      }

      function openWorkspace() {
        window.location.href = "/app/chat?session=main";
      }

      async function logout() {
        try {
          await fetch("/api/auth/logout", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: "{}",
          });
        } finally {
          await refreshSession();
        }
      }

      el("googleBtn").addEventListener("click", startGoogle);
      el("openBtn").addEventListener("click", openWorkspace);
      el("logoutBtn").addEventListener("click", logout);
      el("operatorForm").addEventListener("submit", operatorLogin);
      el("operatorPanel").hidden = !operatorMode;

      refreshSession();
    </script>
  </body>
</html>

name: Package Validation

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'contracts/**'
      - 'nex/**'
      - '.github/workflows/package-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'contracts/**'
      - 'nex/**'
      - '.github/workflows/package-validation.yml'
  workflow_dispatch:
    inputs:
      package_root:
        description: 'Optional package root for hosted cleanroom smoke, for example packages/apps/spike/app or packages/adapters/jira'
        required: false
        type: string
      publish_release:
        description: 'Publish the released artifact before running hosted cleanroom smoke'
        required: false
        default: false
        type: boolean
      cleanup_mode:
        description: 'Fresh hosted server cleanup mode after smoke'
        required: false
        default: destroy
        type: choice
        options:
          - destroy
          - archive
          - retain

jobs:
  validate-packages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /home/runner/work/nexus/nexus
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
          cache-dependency-path: nex/pnpm-lock.yaml

      - name: Install Nex dependencies
        run: pnpm install --frozen-lockfile
        working-directory: /home/runner/work/nexus/nexus/nex

      - name: Build Nex CLI
        run: pnpm build
        working-directory: /home/runner/work/nexus/nexus/nex

      - name: Audit package tree
        run: python3 packages/scripts/audit-packages.py

      - name: Validate discovered package roots
        run: bash packages/scripts/validate-package-roots.sh

  hosted-cleanroom-package-smoke:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.package_root != ''
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /home/runner/work/nexus/nexus
    env:
      FRONTDOOR_SMOKE_ORIGIN: ${{ secrets.FRONTDOOR_SMOKE_ORIGIN }}
      FRONTDOOR_SMOKE_API_TOKEN: ${{ secrets.FRONTDOOR_SMOKE_API_TOKEN }}
      FRONTDOOR_SMOKE_USERNAME: ${{ secrets.FRONTDOOR_SMOKE_USERNAME }}
      FRONTDOOR_SMOKE_PASSWORD: ${{ secrets.FRONTDOOR_SMOKE_PASSWORD }}
      PACKAGE_ROOT: ${{ github.event.inputs.package_root }}
      PUBLISH_RELEASE: ${{ github.event.inputs.publish_release }}
      CLEANUP_MODE: ${{ github.event.inputs.cleanup_mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
          cache-dependency-path: |
            nex/pnpm-lock.yaml
            frontdoor/pnpm-lock.yaml

      - name: Install Nex dependencies
        run: pnpm install --frozen-lockfile
        working-directory: /home/runner/work/nexus/nexus/nex

      - name: Install Frontdoor dependencies
        run: pnpm install --frozen-lockfile
        working-directory: /home/runner/work/nexus/nexus/frontdoor

      - name: Build Nex CLI
        run: pnpm build
        working-directory: /home/runner/work/nexus/nexus/nex

      - name: Require Frontdoor hosted smoke auth
        run: |
          if [[ -z "${FRONTDOOR_SMOKE_ORIGIN}" ]]; then
            echo "missing FRONTDOOR_SMOKE_ORIGIN secret" >&2
            exit 1
          fi
          if [[ -z "${FRONTDOOR_SMOKE_API_TOKEN}" && ( -z "${FRONTDOOR_SMOKE_USERNAME}" || -z "${FRONTDOOR_SMOKE_PASSWORD}" ) ]]; then
            echo "set FRONTDOOR_SMOKE_API_TOKEN or FRONTDOOR_SMOKE_USERNAME/FRONTDOOR_SMOKE_PASSWORD" >&2
            exit 1
          fi

      - name: Run hosted cleanroom package smoke
        run: |
          proof_id="hosted-package-$(printf '%s' "${PACKAGE_ROOT}" | tr '/ ' '-' | tr -cd '[:alnum:]-_')"
          args=(
            bash packages/scripts/capture-hosted-cleanroom-package-smoke.sh
            "${proof_id}"
            --package-root "${PACKAGE_ROOT}"
            --cleanup-mode "${CLEANUP_MODE}"
          )
          if [[ "${PUBLISH_RELEASE}" == "true" ]]; then
            args+=(--publish)
          fi
          "${args[@]}"

      - name: Upload hosted cleanroom proof bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hosted-cleanroom-proof
          path: |
            /home/runner/nexus/state/artifacts/validation/cleanroom/
            /home/runner/work/nexus/nexus/artifacts/package-smoke/
          if-no-files-found: warn

name: Package Validation

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'contracts/**'
      - 'nex/**'
      - '.github/workflows/package-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'contracts/**'
      - 'nex/**'
      - '.github/workflows/package-validation.yml'
  workflow_dispatch:

jobs:
  validate-packages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: /home/runner/work/nexus/nexus
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
          cache-dependency-path: nex/pnpm-lock.yaml

      - name: Install Nex dependencies
        run: pnpm install --frozen-lockfile
        working-directory: /home/runner/work/nexus/nexus/nex

      - name: Build Nex CLI
        run: pnpm build
        working-directory: /home/runner/work/nexus/nexus/nex

      - name: Audit package tree
        run: python3 packages/scripts/audit-packages.py

      - name: Validate discovered package roots
        run: bash packages/scripts/validate-package-roots.sh

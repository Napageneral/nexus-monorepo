openapi: 3.1.0
info:
  title: tiktok-display-adapter Adapter API
  version: 0.1.0
  description: "Published adapter package contract for tiktok-display. This
    package exposes package metadata, connection-health surfaces, and a first
    wave of provider-native read methods for profile and video reads."
tags:
  - name: Adapter
paths:
  /operations/adapter.connections.list:
    post:
      operationId: adapter.connections.list
      summary: List adapter connections
      tags:
        - Adapter
      x-sdk-public: true
      responses:
        "200":
          description: Successful adapter package response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdapterConnectionsListResultSchema"
  /operations/adapter.health:
    post:
      operationId: adapter.health
      summary: Check adapter connection health
      tags:
        - Adapter
      x-sdk-public: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdapterConnectionRequestSchema"
      responses:
        "200":
          description: Successful adapter package response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdapterHealthSchema"
  /operations/tiktok-display.user.info.get:
    post:
      operationId: tiktok-display.user.info.get
      summary: Read the authorized TikTok Display profile
      tags:
        - Adapter
      x-sdk-public: true
      x-nexus-action: read
      x-nexus-mutates-remote: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TikTokDisplayUserInfoGetRequestSchema"
      responses:
        "200":
          description: Successful adapter package response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TikTokDisplayUserInfoGetResponseSchema"
  /operations/tiktok-display.video.list:
    post:
      operationId: tiktok-display.video.list
      summary: Read a page of TikTok Display videos
      tags:
        - Adapter
      x-sdk-public: true
      x-nexus-action: read
      x-nexus-mutates-remote: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TikTokDisplayVideoListRequestSchema"
      responses:
        "200":
          description: Successful adapter package response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TikTokDisplayVideoListResponseSchema"
  /operations/adapter.info:
    post:
      operationId: adapter.info
      summary: Read adapter package metadata
      tags:
        - Adapter
      x-sdk-public: true
      responses:
        "200":
          description: Successful adapter package response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdapterInfoSchema"
components:
  schemas:
    AdapterConnectionRequestSchema:
      type: object
      properties:
        connection_id:
          type: string
      required:
        - connection_id
      additionalProperties: false
    TikTokDisplayUserInfoGetRequestSchema:
      type: object
      properties:
        connection_id:
          type: string
        payload:
          type: object
          additionalProperties: false
          properties: {}
      required:
        - connection_id
      additionalProperties: false
    TikTokDisplayUserInfoGetResponseSchema:
      type: object
      properties:
        profile:
          type: object
          additionalProperties: true
        source_request:
          type: object
          additionalProperties: true
      required:
        - profile
        - source_request
      additionalProperties: false
    TikTokDisplayVideoListRequestSchema:
      type: object
      properties:
        connection_id:
          type: string
        payload:
          type: object
          additionalProperties: false
          properties:
            cursor:
              anyOf:
                - type: integer
                - type: string
                - type: "null"
              minimum: 0
            page_size:
              anyOf:
                - type: integer
                - type: string
                - type: "null"
              minimum: 1
      required:
        - connection_id
      additionalProperties: false
    TikTokDisplayVideoListResponseSchema:
      type: object
      properties:
        cursor:
          anyOf:
            - type: integer
            - type: "null"
        has_more:
          type: boolean
        videos:
          type: array
          items:
            type: object
            additionalProperties: true
        source_request:
          type: object
          additionalProperties: true
      required:
        - cursor
        - has_more
        - videos
        - source_request
      additionalProperties: false
    AdapterConnectionsListResultSchema:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          display_name:
            type: string
          credential_ref:
            type: string
          status:
            type: string
        required:
          - id
        additionalProperties: false
    AdapterHealthSchema:
      type: object
      properties:
        connected:
          type: boolean
        connection_id:
          type: string
        error:
          anyOf:
            - type: string
            - type: "null"
        last_event_at:
          anyOf:
            - type: integer
            - type: "null"
        details:
          type: object
          propertyNames:
            type: string
          additionalProperties: true
      required:
        - connected
        - connection_id
      additionalProperties: false
    AdapterInfoSchema:
      type: object
      properties:
        platform:
          type: string
        name:
          type: string
        version:
          type: string
        operations:
          type: array
          items:
            type: string
        methods:
          type: array
          items:
            type: object
            additionalProperties: true
        credential_service:
          type: string
        multi_account:
          type: boolean
        platform_capabilities:
          type: object
          propertyNames:
            type: string
          additionalProperties: true
        auth:
          type: object
          propertyNames:
            type: string
          additionalProperties: true
      required:
        - platform
        - name
        - version
        - operations
        - methods
      additionalProperties: false

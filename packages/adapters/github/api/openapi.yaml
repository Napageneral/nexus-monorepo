components:
  schemas:
    AdapterInfoSchema:
      $schema: http://json-schema.org/draft-07/schema#
      type: object
      properties:
        platform:
          type: string
        name:
          type: string
        version:
          type: string
        operations:
          type: array
          items:
            type: string
            enum:
              - adapter.info
              - adapter.health
              - adapter.connections.list
              - adapter.monitor.start
              - adapter.serve.start
              - adapter.setup.start
              - adapter.setup.submit
              - adapter.setup.status
              - adapter.setup.cancel
              - records.backfill
        methods:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                anyOf:
                  - type: string
                  - type: "null"
              action:
                type: string
                enum:
                  - read
                  - write
              params:
                anyOf:
                  - type: object
                    propertyNames:
                      type: string
                    additionalProperties: {}
                  - type: "null"
              response:
                anyOf:
                  - type: object
                    propertyNames:
                      type: string
                    additionalProperties: {}
                  - type: "null"
              connection_required:
                type: boolean
              mutates_remote:
                type: boolean
              context_hints:
                type: object
                properties:
                  params:
                    type: object
                    propertyNames:
                      type: string
                    additionalProperties:
                      type: object
                      properties:
                        value: {}
                        source:
                          type: string
                        confidence:
                          type: string
                          enum:
                            - exact
                            - derived
                            - weak
                      required:
                        - value
                        - source
                        - confidence
                      additionalProperties: false
                required:
                  - params
                additionalProperties: false
              origin:
                type: object
                properties:
                  package_kind:
                    type: string
                    enum:
                      - runtime
                      - app
                      - adapter
                  package_id:
                    anyOf:
                      - type: string
                      - type: "null"
                  package_version:
                    anyOf:
                      - type: string
                      - type: "null"
                  declaration_mode:
                    type: string
                    enum:
                      - manifest
                      - openapi
                      - builtin
                  declaration_source:
                    type: string
                  namespace:
                    type: string
                required:
                  - package_id
                  - package_version
                  - declaration_mode
                  - declaration_source
                  - namespace
                additionalProperties: false
            required:
              - name
            additionalProperties: false
        credential_service:
          type: string
        multi_account:
          type: boolean
        platform_capabilities:
          type: object
          properties:
            text_limit:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            caption_limit:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            supports_markdown:
              type: boolean
            markdown_flavor:
              type: string
            supports_tables:
              type: boolean
            supports_code_blocks:
              type: boolean
            supports_embeds:
              type: boolean
            supports_threads:
              type: boolean
            supports_reactions:
              type: boolean
            supports_polls:
              type: boolean
            supports_buttons:
              type: boolean
            supports_edit:
              type: boolean
            supports_delete:
              type: boolean
            supports_media:
              type: boolean
            supports_voice_notes:
              type: boolean
            supports_ptt:
              type: boolean
            max_message_length:
              type: integer
              exclusiveMinimum: 0
              maximum: 9007199254740991
            max_attachments:

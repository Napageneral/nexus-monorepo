openapi: 3.1.0
info:
  title: GitHub Adapter Adapter API
  version: 1.0.11
  description: "Published adapter package contract for github. This artifact
    covers ordinary JSON request/response adapter operations. Long-lived
    stream/session operations remain in the shared adapter protocol and are
    intentionally omitted here: adapter.monitor.start, records.backfill."
tags:
  - name: Adapter
paths:
  /operations/adapter.connections.list:
    post:
      operationId: adapter.connections.list
      summary: List adapter connections
      tags:
        - Adapter
      x-sdk-public: true
      responses:
        "200":
          description: Successful adapter package response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdapterConnectionsListResultSchema"
  /operations/adapter.health:
    post:
      operationId: adapter.health
      summary: Check adapter connection health
      tags:
        - Adapter
      x-sdk-public: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdapterConnectionRequestSchema"
      responses:
        "200":

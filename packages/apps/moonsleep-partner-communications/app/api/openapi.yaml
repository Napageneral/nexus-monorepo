                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
  /runtime/operations/moonsleep-partner-desk.healthcheck:
    post:
      operationId: moonsleep-partner-desk.healthcheck
      summary: Report the installed Partner Desk projection and dormant work contract.
      tags:
        - MoonSleep Partner Desk
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
              additionalProperties: false
      responses:
        "200":
          description: Successful MoonSleep Partner Desk method response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  payload:
                    type: object
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
  /runtime/operations/moonsleep-partner-desk.project-reviewed-cohort:
    post:
      operationId: moonsleep-partner-desk.project-reviewed-cohort
      summary: Project a bounded reviewed cohort into native threads, independent open
        loops, and attention queues.
      tags:
        - MoonSleep Partner Desk
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                record_ids:
                  type: array
                  minItems: 1
                  maxItems: 50
                  uniqueItems: true
                  items:
                    type: string
                    minLength: 1
                    maxLength: 512
                identity_resolutions:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                workspace_assertions:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                open_loop_assertions:
                  type: array
                  maxItems: 100
                  items:
                    type: object
                source_coverage_assertions:
                  type: array
                  maxItems: 50
                  items:
                    type: object
              required:
                - record_ids
                - identity_resolutions
                - workspace_assertions
                - open_loop_assertions
                - source_coverage_assertions
              additionalProperties: false
      responses:
        "200":
          description: Successful MoonSleep Partner Desk method response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  payload:
                    type: object
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UnauthorizedError:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
          enum:
            - unauthorized
            - not_authenticated
    GenericError:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
        error:
          type: string
        detail:
          type:
            - string
            - "null"

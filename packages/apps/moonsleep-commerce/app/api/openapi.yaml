openapi: 3.1.0
info:
  title: MoonSleep Commerce App API
  version: 0.3.4
  description: Project exact Shopify records into MoonSleep identity and typed
    commerce state through public Nex operations.
servers:
  - url: https://{tenantId}.nexushub.sh
    variables:
      tenantId:
        default: t-example
tags:
  - name: MoonSleep Commerce
paths:
  /runtime/operations/moonsleep-commerce.healthcheck:
    post:
      operationId: moonsleep-commerce.healthcheck
      summary: Report the installed MoonSleep commerce projector contract.
      tags:
        - MoonSleep Commerce
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        "200":
          description: Successful MoonSleep Commerce method response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  payload:
                    type: object
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
  /runtime/operations/moonsleep-commerce.shopify-commerce.inspect-backfill:
    post:
      operationId: moonsleep-commerce.shopify-commerce.inspect-backfill
      summary: Read and validate the exact sorted committed Shopify order and
        line-item record IDs without calling Shopify or projecting commerce

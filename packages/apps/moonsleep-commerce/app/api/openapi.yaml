openapi: 3.1.0
info:
  title: MoonSleep Commerce App API
  version: 0.1.1
  description: Project exact Shopify records into MoonSleep identity and typed
    commerce state through public Nex operations.
servers:
  - url: https://{tenantId}.nexushub.sh
    variables:
      tenantId:
        default: t-example
tags:
  - name: MoonSleep Commerce
paths:
  /runtime/operations/moonsleep-commerce.healthcheck:
    post:
      operationId: moonsleep-commerce.healthcheck
      summary: Report the installed MoonSleep commerce projector contract.
      tags:
        - MoonSleep Commerce
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        "200":
          description: Successful MoonSleep Commerce method response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  payload:
                    type: object
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
  /runtime/operations/moonsleep-commerce.shopify-customers.inspect-backfill:
    post:
      operationId: moonsleep-commerce.shopify-customers.inspect-backfill
      summary: Read, validate, and return the exact sorted committed Shopify customer
        record IDs and their hash through public records.list without projecting identities.
      tags:
        - MoonSleep Commerce
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                shop_domain:
                  type: string
                  pattern: ^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.myshopify\.com$
                  maxLength: 255
                connection_id:
                  type: string
                  pattern: ^[a-z0-9](?:[a-z0-9._-]{0,126}[a-z0-9])?$
                  maxLength: 128
              required:
                - shop_domain
                - connection_id
              additionalProperties: false
      responses:
        "200":
          description: Successful MoonSleep Commerce method response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  payload:
                    type: object
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
  /runtime/operations/moonsleep-commerce.shopify-customers.project-backfill:
    post:
      operationId: moonsleep-commerce.shopify-customers.project-backfill
      summary: Project one explicit bounded batch of committed Shopify customer records
        into Nex identity and return deterministic replay counters and hashes.
      tags:
        - MoonSleep Commerce
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                record_ids:
                  type: array
                  minItems: 1
                  maxItems: 250
                  uniqueItems: true
                  items:
                    type: string
                    minLength: 1
                    maxLength: 512
                record_set_sha256:
                  type: string
                  pattern: ^[0-9a-f]{64}$
              required:
                - record_ids
                - record_set_sha256
              additionalProperties: false
      responses:
        "200":
          description: Successful MoonSleep Commerce method response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  payload:
                    type: object
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
  /runtime/operations/moonsleep-commerce.shopify-customers.project-cohort:
    post:
      operationId: moonsleep-commerce.shopify-customers.project-cohort
      summary: Project an explicit bounded cohort of committed Shopify customer
        records into Nex identity using replay-safe public operations.
      tags:
        - MoonSleep Commerce
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                record_ids:
                  type: array
                  minItems: 1
                  maxItems: 50
                  uniqueItems: true
                  items:
                    type: string
                    minLength: 1
                    maxLength: 512
              required:
                - record_ids
              additionalProperties: false
      responses:
        "200":
          description: Successful MoonSleep Commerce method response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  payload:
                    type: object
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
  /runtime/operations/moonsleep-commerce.shopify-source.seed-identities:
    post:
      operationId: moonsleep-commerce.shopify-source.seed-identities
      summary: Replay-safely seed the Shopify store and integration routing identities
        through public Nex identity operations.
      tags:
        - MoonSleep Commerce
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                shop_domain:
                  type: string
                  pattern: ^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.myshopify\.com$
                  maxLength: 255
                connection_id:
                  type: string
                  pattern: ^[a-z0-9](?:[a-z0-9._-]{0,126}[a-z0-9])?$
                  maxLength: 128
              required:
                - shop_domain
                - connection_id
              additionalProperties: false
      responses:
        "200":
          description: Successful MoonSleep Commerce method response
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  payload:
                    type: object
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - error
                properties:
                  ok:
                    type: boolean
                    enum:
                      - false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                      details:
                        type:
                          - array
                          - "null"
                        items:
                          type: string
                    required:
                      - message
                    additionalProperties: true
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    UnauthorizedError:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: string
          enum:
            - unauthorized
            - not_authenticated
    GenericError:
      type: object
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
        error:
          type: string
        detail:
          type:
            - string
            - "null"

openapi: 3.1.0
info:
  title: Nex API
  version: 2026-03-12
  description: Published HTTP projection of the Nex runtime API from the canonical
    runtime-api operation layer. Canonical operation paths are
    /runtime/operations/<method>; static alias routes are included where the
    runtime exposes them.
servers:
  - url: https://{tenantId}.nexushub.sh
    variables:
      tenantId:
        default: t-example
  - url: http://127.0.0.1:18789
tags:
  - name: ACL
  - name: Adapters
  - name: Agents
  - name: Apps
  - name: Auth
  - name: Channels
  - name: Config
  - name: Contacts
  - name: Credentials
  - name: DAGs
  - name: Entities
  - name: Events
  - name: Groups
  - name: Jobs
  - name: Memory
  - name: Models
  - name: Product Control Plane
  - name: Records
  - name: Runtime
  - name: Schedules
  - name: Skills
  - name: Talk
  - name: Tools
  - name: Wizard
  - name: Workspaces

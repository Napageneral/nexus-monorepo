                        type: string
                      decision:
                        type: string
                        nullable: true
                      createdAtMs:
                        minimum: 0
                        type: integer
                        format: int64
                      expiresAtMs:
                        minimum: 0
                        type: integer
                        format: int64
                  meta:
                    anyOf:
                      - type: object
                        additionalProperties: true
                      - type: "null"

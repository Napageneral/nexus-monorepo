# Relationship-Based Policies
#
# These policies grant access based on relationship to the owner.
# Relationships are stored as entity tags (e.g., "relationship:partner").

policies:

  # ═══════════════════════════════════════════════════════════════════════════
  # PARTNER ACCESS
  # ═══════════════════════════════════════════════════════════════════════════

  - name: partner-access
    description: Partner gets trusted but scoped access

    match:
      sender:
        tags: ["relationship:partner"]

    effect: allow

    permissions:
      tools:
        allow: [web_search, weather, calendar_read, read_file, smart_home]
        deny: [shell, send_email, read_messages, credentials_*]
      credentials: []
      data: restricted

    session:
      persona: atlas
      key: "partner:{sender.name}"

    priority: 80

  # ═══════════════════════════════════════════════════════════════════════════
  # FAMILY ACCESS
  # ═══════════════════════════════════════════════════════════════════════════

  - name: family-access
    description: Family members get limited access

    match:
      sender:
        tags: ["relationship:family"]

    effect: allow

    permissions:
      tools:
        allow: [web_search, weather]
        deny: ["*"]
      credentials: []
      data: none

    session:
      persona: atlas
      key: "family:{sender.name}"

    priority: 70

  # ═══════════════════════════════════════════════════════════════════════════
  # WORK CONTACTS
  # ═══════════════════════════════════════════════════════════════════════════

  - name: work-contacts
    description: Work contacts get work-scoped access

    match:
      sender:
        tags: ["relationship:work"]

    effect: allow

    permissions:
      tools:
        allow: [web_search, calendar_read, read_file]
        deny: [shell, send_email, credentials_*]
      credentials: []
      data: restricted

    session:
      persona: atlas
      key: "work:{sender.name}"

    priority: 65

  # ═══════════════════════════════════════════════════════════════════════════
  # FRIENDS
  # ═══════════════════════════════════════════════════════════════════════════

  - name: friends-access
    description: Friends get basic access

    match:
      sender:
        tags: ["relationship:friend"]

    effect: allow

    permissions:
      tools:
        allow: [web_search, weather]
      credentials: []
      data: none

    session:
      persona: atlas
      key: "friend:{sender.name}"

    priority: 60

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nex Cleanroom Proof</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #050816;
        color: #d9e1ff;
      }
      header {
        padding: 16px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        background: linear-gradient(90deg, rgba(19, 35, 74, 0.96), rgba(11, 17, 35, 0.96));
      }
      header h1 {
        margin: 0;
        font-size: 18px;
      }
      header p {
        margin: 6px 0 0;
        font-size: 12px;
        color: #9fb2ff;
      }
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        padding: 12px;
        height: calc(100vh - 86px);
        box-sizing: border-box;
      }
      section {
        min-height: 0;
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        overflow: hidden;
        background: rgba(8, 12, 25, 0.95);
      }
      h2 {
        margin: 0;
        padding: 10px 12px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: #85a0ff;
      }
      pre {
        margin: 0;
        padding: 12px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
        line-height: 1.45;
        flex: 1;
      }
      .empty {
        color: #6d7ca9;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Nex Cleanroom Proof Session</h1>
      <p>The sandbox session is running. This screen mirrors stdout and stderr from the proof command.</p>
    </header>
    <main>
      <section>
        <h2>stdout</h2>
        <pre id="stdout" class="empty">(waiting for output)</pre>
      </section>
      <section>
        <h2>stderr</h2>
        <pre id="stderr" class="empty">(waiting for output)</pre>
      </section>
    </main>
    <script>
      const stdoutNode = document.getElementById("stdout");
      const stderrNode = document.getElementById("stderr");

      async function refreshLog(name, node) {
        try {
          const response = await fetch(`/${name}.log?ts=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) {
            node.textContent = `(unable to load ${name}.log)`;
            node.classList.add("empty");
            return;
          }
          const text = await response.text();
          if (text.trim()) {
            node.textContent = text;
            node.classList.remove("empty");
            node.scrollTop = node.scrollHeight;
          } else {
            node.textContent = "(waiting for output)";
            node.classList.add("empty");
          }
        } catch (error) {
          node.textContent = String(error);
          node.classList.add("empty");
        }
      }

      async function tick() {
        await Promise.all([
          refreshLog("stdout", stdoutNode),
          refreshLog("stderr", stderrNode),
        ]);
      }

      tick();
      setInterval(tick, 1000);
    </script>
  </body>
</html>
